name: https_time_server
description: HTTPS trigger examples for Firebase Functions for Dart
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  firebase_functions:
    git:
      url: https://github.com/firebase/firebase-functions-dart
      ref: main
  firebase_admin_sdk:
    git:
      url: https://github.com/firebase/firebase-admin-dart
      path: packages/firebase_admin_sdk
      ref: main
  google_cloud_firestore:
    git:
      url: https://github.com/firebase/firebase-admin-dart
      path: packages/google_cloud_firestore
      ref: main
  intl: ^0.20.2

dev_dependencies:
  build_runner: ^2.10.5
  lints: ^6.0.0

dependency_overrides:
  firebase_admin_sdk:
      git:
        url: https://github.com/firebase/firebase-admin-dart
        path: packages/firebase_admin_sdk
        ref: main
  google_cloud_firestore:
      git:
        url: https://github.com/firebase/firebase-admin-dart
        path: packages/google_cloud_firestore
        ref: main
